'fead4e8c-8319-ee11-8f6d-002248c7287d' and a.status_reason_id not in ('020ca7a4-8319-ee11-8f6d-002248c7287d','7a4ab7da-8319-ee11-8f6d-002248c7287d') group by a.effective_from_date having count(1)=1)) as subquery)) limit 1;

