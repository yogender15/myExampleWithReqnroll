# Appeal,Proposal
findhereditamentForIFCWales_New_2005= SELECT BN.BAND,PL.UPRN,PL.TOWN,PL.POSTCODE,A.EFFECTIVE_FROM_DATE FROM	CT.BANDING_ASSESSMENT A	JOIN PROPERTY.BILLING_AUTHORITY_ASSIGNMENT B ON A.DU_ID = B.DU_ID  JOIN SHARED.BILLING_AUTHORITY AC ON B.BA_ID = AC.BA_ID JOIN PROPERTY.DU_LABEL PL ON A.DU_ID = PL.DU_ID and PL.label_source_id='fd7f183d-bcb2-ed11-83ff-0022484283ba'	JOIN CT.BAND BN ON BN.BAND_ID = A.BAND_ID JOIN REPORTING.MV_DATA_SEARCH MV_DS ON MV_DS.UPRN = PL.UPRN WHERE	BN.BAND IN ('B', 'C', 'D', 'E', 'F', 'G', 'H', 'I')	AND AC.BA_CODE IN ('6815') AND MV_DS.TAXYEARLIST = '2005'and a.effective_from_date = '2005-04-01' AND A.NAME LIKE '%Current (live entry)%' AND A.STATUS_REASON_ID = 'fead4e8c-8319-ee11-8f6d-002248c7287d'	AND A.STATUS_REASON_ID NOT IN (	'020ca7a4-8319-ee11-8f6d-002248c7287d',	'7a4ab7da-8319-ee11-8f6d-002248c7287d'	) ORDER BY RANDOM() LIMIT	1;
findHereditament_CAMBRIDGE=select bn.band ,pl.uprn,a.effective_from_date from ct.banding_assessment a join property.billing_authority_assignment b on a.du_id = b.du_id  join shared.billing_authority ac on b.ba_id = ac.ba_id  join property.du_label pl on a.du_id = pl.du_id join ct.band bn on bn.band_id = a.band_id where bn.band in ('B','C','D','E','F','G','H','I') and a.is_composite='false' and a.name not like '%Deleted%' and a.name like '%Current (live entry)%' and ac.ba_code in ('0505') and pl.uprn is not null and a.effective_from_date>='2005-05-01' GROUP BY pl.uprn, bn.band,a.effective_from_date HAVING COUNT(*) = 1 ORDER BY RANDOM() LIMIT 1;
