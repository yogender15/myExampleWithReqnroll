# InformalChallenge,NewPropertyReentry
findhereditamentForIFCWales_New_1993= SELECT	BN.BAND,PL.UPRN,PL.TOWN,PL.POSTCODE,A.EFFECTIVE_FROM_DATE FROM	CT.BANDING_ASSESSMENT A	JOIN PROPERTY.BILLING_AUTHORITY_ASSIGNMENT B ON A.DU_ID = B.DU_ID  JOIN SHARED.BILLING_AUTHORITY AC ON B.BA_ID = AC.BA_ID JOIN PROPERTY.DU_LABEL PL ON A.DU_ID = PL.DU_ID and PL.label_source_id='fd7f183d-bcb2-ed11-83ff-0022484283ba'	JOIN CT.BAND BN ON BN.BAND_ID = A.BAND_ID JOIN REPORTING.MV_DATA_SEARCH MV_DS ON MV_DS.UPRN = PL.UPRN WHERE	BN.BAND IN ('B', 'C', 'D', 'E', 'F', 'G', 'H', 'I')	AND AC.BA_CODE IN ('6815') AND MV_DS.TAXYEARLIST = '1993' AND A.NAME LIKE '%Current (live entry)%' AND A.STATUS_REASON_ID = 'fead4e8c-8319-ee11-8f6d-002248c7287d'	AND A.STATUS_REASON_ID NOT IN (	'020ca7a4-8319-ee11-8f6d-002248c7287d',	'7a4ab7da-8319-ee11-8f6d-002248c7287d'	) ORDER BY RANDOM() LIMIT	1;
